<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinanceFlow — Finance Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #fff; color: #0F0F0F; -webkit-font-smoothing: antialiased; min-height: 100vh; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; }

/* Navbar */
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; background: #fff; height: 64px; border-bottom: 1px solid #EBEBEB; display: flex; align-items: center; }
.nav-inner { max-width: 1120px; margin: 0 auto; padding: 0 24px; width: 100%; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-box { width: 28px; height: 28px; border-radius: 8px; background: #0F0F0F; display: flex; align-items: center; justify-content: center; }
.logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
.nav-links { display: flex; gap: 28px; }
.nav-links a { font-size: 13.5px; color: #555; letter-spacing: -0.01em; transition: color .2s; }
.nav-links a:hover, .nav-links a.active { color: #0F0F0F; }
.nav-links a.active { font-weight: 500; }
.nav-btns { display: flex; gap: 10px; }
.btn-ghost { font-size: 13.5px; padding: 7px 15px; border-radius: 10px; border: 1px solid #E0E0E0; color: #333; background: transparent; transition: all .2s; }
.btn-ghost:hover { border-color: #0F0F0F; color: #0F0F0F; }
.btn-dark { font-size: 13.5px; padding: 7px 15px; border-radius: 10px; background: #0F0F0F; color: #fff; border: none; transition: background .2s; }
.btn-dark:hover { background: #2a2a2a; }

/* Page */
.page { padding-top: 64px; min-height: 100vh; background: #FAFAF8; }

/* ── ANIMATIONS ── */
@keyframes fadeUp   { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
@keyframes scaleIn  { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }
@keyframes slideLeft{ from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
@keyframes popIn    { 0%{transform:scale(0) rotate(-10deg);opacity:0;} 70%{transform:scale(1.15) rotate(3deg);} 100%{transform:scale(1) rotate(0);opacity:1;} }
@keyframes pulse    { 0%,100%{transform:scale(1);} 50%{transform:scale(1.05);} }
@keyframes shimmer  { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
@keyframes bounceIn {
  0%   { transform:scale(0.5); opacity:0; }
  60%  { transform:scale(1.1); opacity:1; }
  80%  { transform:scale(0.95); }
  100% { transform:scale(1); }
}
@keyframes checkDraw {
  from { stroke-dashoffset: 60; }
  to   { stroke-dashoffset: 0; }
}
@keyframes crossDraw {
  from { stroke-dashoffset: 30; }
  to   { stroke-dashoffset: 0; }
}
@keyframes progressFill {
  from { width: 0; }
}
@keyframes starSpin {
  0%   { transform:rotate(0deg) scale(0); opacity:0; }
  50%  { transform:rotate(180deg) scale(1.3); opacity:1; }
  100% { transform:rotate(360deg) scale(1); opacity:1; }
}

/* HERO */
.hero { padding: 56px 24px 40px; text-align: center; }
.hero-badge { display: inline-flex; align-items: center; gap: 7px; padding: 5px 14px; border-radius: 999px; background: #F5F1E8; border: 1px solid #E8DFC0; font-size: 12px; color: #8B7340; font-weight: 500; letter-spacing: .04em; margin-bottom: 22px; animation: fadeUp .5s ease both; }
.hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #C9A84C; }
.hero-title { font-family: 'DM Serif Display', Georgia, serif; font-size: 44px; line-height: 1.1; font-weight: 600; letter-spacing: -.035em; color: #0F0F0F; margin-bottom: 14px; animation: fadeUp .55s ease .06s both; }
.hero-title .gold { color: #C9A84C; }
.hero-sub { font-size: 16px; line-height: 1.7; color: #555; max-width: 460px; margin: 0 auto 32px; letter-spacing: -.01em; animation: fadeUp .55s ease .12s both; }
.hero-meta { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; animation: fadeUp .55s ease .18s both; }
.hero-meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #777; }
.hero-meta-dot { width: 5px; height: 5px; border-radius: 50%; background: #C9A84C; }

/* PROGRESS BAR */
.progress-wrap { max-width: 680px; margin: 0 auto 24px; padding: 0 24px; animation: fadeUp .55s ease .22s both; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-label { font-size: 12.5px; font-weight: 500; color: #888; letter-spacing: -.01em; }
.progress-fraction { font-size: 12.5px; font-weight: 600; color: #0F0F0F; letter-spacing: -.01em; }
.progress-track { height: 6px; background: #EBEBEB; border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: #0F0F0F; border-radius: 999px; transition: width .5s cubic-bezier(.4,0,.2,1); }

/* QUIZ CARD */
.quiz-area { max-width: 680px; margin: 0 auto; padding: 0 24px 80px; }
.quiz-card { background: #fff; border: 1px solid #E8E8E8; border-radius: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.07); overflow: hidden; animation: scaleIn .4s cubic-bezier(.4,0,.2,1) both; }
.card-top { padding: 28px 32px 0; }
.q-counter { font-size: 11.5px; font-weight: 600; color: #C9A84C; text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; }
.q-text { font-size: 20px; font-weight: 600; color: #0F0F0F; line-height: 1.45; letter-spacing: -.02em; margin-bottom: 8px; }
.q-category { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; color: #999; letter-spacing: -.01em; margin-bottom: 28px; }
.q-category-dot { width: 4px; height: 4px; border-radius: 50%; background: #CCC; }

/* OPTIONS */
.options { padding: 0 32px 28px; display: flex; flex-direction: column; gap: 10px; }
.option-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 14px; border: 1.5px solid #EBEBEB; background: #fff; text-align: left; transition: all .15s ease; cursor: pointer; position: relative; overflow: hidden; }
.option-btn::before { content:''; position:absolute; inset:0; background:#F8F8F6; opacity:0; transition:opacity .15s; }
.option-btn:hover:not(:disabled)::before { opacity:1; }
.option-btn:hover:not(:disabled) { border-color: #D0D0D0; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.option-btn:disabled { cursor: default; }
.option-letter { width: 30px; height: 30px; border-radius: 9px; background: #F5F5F3; border: 1px solid #E8E8E8; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #777; flex-shrink: 0; transition: all .2s; position: relative; z-index: 1; }
.option-text { font-size: 14.5px; color: #333; letter-spacing: -.01em; line-height: 1.45; position: relative; z-index: 1; flex: 1; }

/* Option states */
.option-btn.selected-correct { border-color: #C9A84C !important; background: #FBF7EC !important; }
.option-btn.selected-correct::before { opacity: 0 !important; }
.option-btn.selected-correct .option-letter { background: #C9A84C; border-color: #C9A84C; color: #fff; }
.option-btn.selected-correct .option-text { color: #7A6030; font-weight: 500; }

.option-btn.selected-wrong { border-color: #E5A0A0 !important; background: #FDF3F3 !important; }
.option-btn.selected-wrong::before { opacity: 0 !important; }
.option-btn.selected-wrong .option-letter { background: #D97070; border-color: #D97070; color: #fff; }
.option-btn.selected-wrong .option-text { color: #8A4040; }

.option-btn.reveal-correct { border-color: #C9A84C !important; background: #FBF7EC !important; }
.option-btn.reveal-correct::before { opacity: 0 !important; }
.option-btn.reveal-correct .option-letter { background: #C9A84C; border-color: #C9A84C; color: #fff; }
.option-btn.reveal-correct .option-text { color: #7A6030; font-weight: 500; }

.option-btn.dimmed { opacity: 0.45; }

/* FEEDBACK */
.feedback-bar { margin: 0 32px 28px; padding: 16px 18px; border-radius: 14px; animation: slideLeft .3s ease both; display: flex; gap: 14px; align-items: flex-start; }
.feedback-bar.correct { background: #FBF7EC; border: 1px solid #E8DFC0; }
.feedback-bar.wrong   { background: #FDF3F3; border: 1px solid #F0CCCC; }
.feedback-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.feedback-bar.correct .feedback-icon { background: #C9A84C; }
.feedback-bar.wrong   .feedback-icon { background: #D97070; }
.feedback-content {}
.feedback-status { font-size: 13px; font-weight: 700; letter-spacing: -.01em; margin-bottom: 3px; }
.feedback-bar.correct .feedback-status { color: #7A6030; }
.feedback-bar.wrong   .feedback-status { color: #8A4040; }
.feedback-text { font-size: 13px; color: #666; line-height: 1.6; letter-spacing: -.01em; }

/* NEXT BUTTON */
.next-btn-wrap { padding: 0 32px 32px; }
.next-btn { width: 100%; padding: 14px; border-radius: 14px; background: #0F0F0F; color: #fff; font-size: 14px; font-weight: 500; border: none; letter-spacing: -.01em; transition: all .2s; animation: fadeIn .3s ease both; display: flex; align-items: center; justify-content: center; gap: 8px; }
.next-btn:hover { background: #2a2a2a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.15); }

/* RESULT CARD */
.result-card { background: #fff; border: 1px solid #E8E8E8; border-radius: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.07); overflow: hidden; animation: bounceIn .6s cubic-bezier(.4,0,.2,1) both; }
.result-top { padding: 40px 40px 32px; text-align: center; }
.score-ring-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
.score-label-small { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.score-big { font-family: 'DM Serif Display', Georgia, serif; font-size: 64px; font-weight: 700; letter-spacing: -.04em; color: #0F0F0F; line-height: 1; }
.score-denom { font-size: 28px; color: #999; }
.score-msg { font-size: 16px; color: #555; line-height: 1.65; max-width: 360px; margin: 0 auto; letter-spacing: -.01em; }

.result-insights { padding: 0 32px 32px; display: flex; flex-direction: column; gap: 12px; }
.insight-card { padding: 18px 20px; border-radius: 16px; border: 1px solid #EBEBEB; }
.insight-card.strength { background: #FBF7EC; border-color: #E8DFC0; }
.insight-card.improve  { background: #FDF3F3; border-color: #F0CCCC; }
.insight-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; }
.insight-card.strength .insight-label { color: #8B7340; }
.insight-card.improve  .insight-label { color: #9A4A4A; }
.insight-text { font-size: 13.5px; color: #444; line-height: 1.6; letter-spacing: -.01em; }

.result-actions { padding: 0 32px 36px; display: flex; gap: 10px; flex-wrap: wrap; }
.result-btn-primary { flex: 1; padding: 13px; border-radius: 14px; background: #0F0F0F; color: #fff; font-size: 14px; font-weight: 500; border: none; letter-spacing: -.01em; transition: all .2s; min-width: 140px; }
.result-btn-primary:hover { background: #2a2a2a; transform: translateY(-1px); }
.result-btn-secondary { flex: 1; padding: 13px; border-radius: 14px; background: #fff; color: #0F0F0F; font-size: 14px; font-weight: 500; border: 1.5px solid #EBEBEB; letter-spacing: -.01em; transition: all .2s; min-width: 140px; }
.result-btn-secondary:hover { border-color: #0F0F0F; transform: translateY(-1px); }

/* Score ring animation */
.ring-track { transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1); }

/* CONFETTI */
.confetti-piece { position: fixed; width: 8px; height: 8px; top: -10px; pointer-events: none; z-index: 9999; animation: confettiFall linear forwards; border-radius: 2px; }

/* CHECK/CROSS SVG */
.check-path { stroke-dasharray: 60; stroke-dashoffset: 60; animation: checkDraw .4s ease .1s forwards; }
.cross-path { stroke-dasharray: 30; stroke-dashoffset: 30; animation: crossDraw .3s ease .05s forwards; }

/* Timer ring */
.timer-ring { transition: stroke-dashoffset .9s linear; }

/* Score ring SVG */
.score-circle-fill { transition: stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) .3s; }

/* Streak */
.streak-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 999px; background: #F5F1E8; border: 1px solid #E8DFC0; font-size: 12px; color: #8B7340; font-weight: 600; margin-bottom: 12px; animation: popIn .4s ease both; }

@media (max-width: 640px) {
  .hero-title { font-size: 32px; }
  .card-top { padding: 22px 20px 0; }
  .options { padding: 0 20px 20px; }
  .feedback-bar { margin: 0 20px 20px; }
  .next-btn-wrap { padding: 0 20px 24px; }
  .q-text { font-size: 17px; }
  .result-top { padding: 28px 24px 20px; }
  .result-insights { padding: 0 20px 20px; }
  .result-actions { padding: 0 20px 24px; }
  .nav-links { display: none; }
}
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── QUIZ DATA ────────────────────────────────────────────────────────────────
const QUESTIONS = [
  {
    id: 1,
    category: "Investing",
    question: "What does SIP stand for in the context of mutual fund investing?",
    options: ["Systematic Investment Plan","Standard Interest Protocol","Secure Investment Portfolio","Simple Indexed Plan"],
    correct: 0,
    explanation: "SIP stands for Systematic Investment Plan — it allows investors to invest a fixed amount regularly in a mutual fund, helping average out market volatility over time."
  },
  {
    id: 2,
    category: "Banking",
    question: "What is compound interest?",
    options: ["Interest calculated only on the principal amount","Interest earned on both the principal and accumulated interest","A fixed interest rate guaranteed by the bank","Interest paid monthly regardless of balance"],
    correct: 1,
    explanation: "Compound interest is calculated on both the initial principal and the interest already accumulated — meaning your money grows exponentially rather than linearly over time."
  },
  {
    id: 3,
    category: "Risk",
    question: "Which of the following investment options is generally considered the safest?",
    options: ["Small-cap stocks","Cryptocurrency","Government bonds","Sector-specific mutual funds"],
    correct: 2,
    explanation: "Government bonds (like G-Secs or Treasury bonds) are backed by the government and are considered the lowest-risk investment. They offer lower but stable returns."
  },
  {
    id: 4,
    category: "Strategy",
    question: "What does diversification mean in an investment portfolio?",
    options: ["Putting all money in one high-return asset","Investing only in international markets","Spreading investments across different asset classes to reduce risk","Changing investments every month"],
    correct: 2,
    explanation: "Diversification means spreading your investments across different asset classes (stocks, bonds, gold, etc.) so that a loss in one doesn't heavily impact your overall portfolio."
  },
  {
    id: 5,
    category: "Banking",
    question: "What does EMI stand for in a loan context?",
    options: ["Estimated Monthly Installment","Equated Monthly Installment","External Market Index","Earned Money Interest"],
    correct: 1,
    explanation: "EMI stands for Equated Monthly Installment — a fixed payment made by a borrower to a lender on a specific date each month to repay the principal and interest of a loan."
  },
  {
    id: 6,
    category: "Economics",
    question: "Inflation refers to which of the following?",
    options: ["A rise in the value of currency","A decrease in the general price level of goods","A general increase in the price level of goods and services","The interest rate set by the central bank"],
    correct: 2,
    explanation: "Inflation is the rate at which the general level of prices for goods and services rises, reducing the purchasing power of money over time."
  },
  {
    id: 7,
    category: "Investing",
    question: "What is an index fund?",
    options: ["A fund that actively picks stocks to beat the market","A fund that tracks a market index like Nifty 50 or Sensex","A government-backed savings scheme","A fixed-deposit product offered by banks"],
    correct: 1,
    explanation: "An index fund passively tracks a market index (like Nifty 50) by holding the same stocks in the same proportions — offering low costs and broad market exposure."
  },
  {
    id: 8,
    category: "Tax",
    question: "Under Section 80C of the Income Tax Act, what is the maximum deduction a taxpayer can claim?",
    options: ["₹1,00,000","₹1,50,000","₹2,00,000","₹2,50,000"],
    correct: 1,
    explanation: "Under Section 80C, you can claim a maximum deduction of ₹1,50,000 per financial year on investments in instruments like PPF, ELSS, NSC, and life insurance premiums."
  },
  {
    id: 9,
    category: "Planning",
    question: "The 50/30/20 rule of budgeting recommends splitting income into which three categories?",
    options: ["Savings / Debt / Food","Needs / Wants / Savings","Bills / Entertainment / Emergency","Rent / Food / Investments"],
    correct: 1,
    explanation: "The 50/30/20 rule suggests allocating 50% of income to needs (rent, food), 30% to wants (entertainment), and 20% to savings or debt repayment."
  },
  {
    id: 10,
    category: "Investing",
    question: "What is the 'Rule of 72' used for in personal finance?",
    options: ["Calculating monthly EMI","Estimating how long it takes to double your investment","Determining safe withdrawal rate in retirement","Calculating tax liability on investments"],
    correct: 1,
    explanation: "The Rule of 72 is a quick mental math shortcut: divide 72 by your annual return rate to estimate the number of years needed to double your investment."
  }
];

const CATEGORY_COLORS = {
  Investing: { bg: '#F0F5FF', text: '#4A6FA5', border: '#D0E0FF' },
  Banking:   { bg: '#F0FBF4', text: '#3A7A5A', border: '#C0E8D0' },
  Risk:      { bg: '#FFF0F0', text: '#A04A4A', border: '#F8C8C8' },
  Strategy:  { bg: '#F5F1E8', text: '#8B7340', border: '#E8DFC0' },
  Economics: { bg: '#F8F0FF', text: '#7A4AA0', border: '#E0C8F8' },
  Tax:       { bg: '#F0FBF4', text: '#3A7A5A', border: '#C0E8D0' },
  Planning:  { bg: '#F5F5F3', text: '#555',    border: '#E0E0E0' },
};

// ─── SOUND ────────────────────────────────────────────────────────────────────
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.06, ctx.currentTime);
    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    } else {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, ctx.currentTime);
      osc.frequency.setValueAtTime(250, ctx.currentTime + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      osc.start(); osc.stop(ctx.currentTime + 0.4);
    }
  } catch(e) {}
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
const CONFETTI_COLORS = ['#C9A84C','#0F0F0F','#D97070','#4A6FA5','#3A7A5A','#E8DFC0'];

function launchConfetti() {
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden;';
  document.body.appendChild(container);
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
      const size  = 6 + Math.random() * 8;
      const left  = Math.random() * 100;
      const duration = 2.5 + Math.random() * 2;
      const delay = Math.random() * 0.8;
      const shape = Math.random() > 0.5 ? '50%' : '2px';
      p.style.cssText = `position:absolute;width:${size}px;height:${size}px;background:${color};left:${left}%;top:-20px;border-radius:${shape};animation:confettiFall ${duration}s ${delay}s ease-in forwards;`;
      container.appendChild(p);
    }, i * 20);
  }
  setTimeout(() => container.remove(), 5000);
}

// ─── SCORE RING ───────────────────────────────────────────────────────────────
function ScoreRing({ score, total }) {
  const pct = score / total;
  const r = 70, cx = 80, cy = 80, sw = 10;
  const C = 2 * Math.PI * r;
  const [offset, setOffset] = useState(C);
  useEffect(() => {
    const t = setTimeout(() => setOffset(C - pct * C), 300);
    return () => clearTimeout(t);
  }, []);
  const color = pct >= 0.8 ? '#C9A84C' : pct >= 0.5 ? '#4A6FA5' : '#D97070';
  return (
    <svg width="160" height="160" viewBox="0 0 160 160">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F0F0F0" strokeWidth={sw}/>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={sw}
        strokeDasharray={C} strokeDashoffset={offset} strokeLinecap="round"
        transform={`rotate(-90 ${cx} ${cy})`} className="score-circle-fill"
        style={{transition:'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) .3s'}}/>
      <text x={cx} y={cy-8} textAnchor="middle" fontSize="32" fontWeight="700" fill="#0F0F0F" fontFamily="'DM Serif Display',serif">
        {score}
      </text>
      <text x={cx} y={cy+16} textAnchor="middle" fontSize="15" fill="#BBB" fontFamily="'DM Sans',sans-serif">
        of {total}
      </text>
    </svg>
  );
}

// ─── FEEDBACK ICON ────────────────────────────────────────────────────────────
function CheckIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path className="check-path" d="M2.5 7L5.5 10L11.5 4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}
function CrossIcon() {
  return (
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path className="cross-path" d="M2.5 2.5L9.5 9.5M9.5 2.5L2.5 9.5" stroke="white" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────
function ProgressBar({ current, total }) {
  const pct = (current / total) * 100;
  return (
    <div className="progress-wrap">
      <div className="progress-header">
        <span className="progress-label">Progress</span>
        <span className="progress-fraction">{current} / {total}</span>
      </div>
      <div className="progress-track">
        <div className="progress-fill" style={{ width: `${pct}%` }}/>
      </div>
    </div>
  );
}

// ─── QUIZ RESULT ──────────────────────────────────────────────────────────────
function QuizResult({ score, total, onRetry }) {
  const pct = score / total;
  useEffect(() => {
    if (pct >= 0.6) setTimeout(launchConfetti, 400);
  }, []);

  const getMessage = () => {
    if (pct === 1)    return "Perfect score! You're a finance genius. 🎯";
    if (pct >= 0.8)   return "Impressive! Your financial knowledge is top-tier. 🌟";
    if (pct >= 0.6)   return "Good work! You have a solid finance foundation. 📈";
    if (pct >= 0.4)   return "Not bad — keep learning and you'll get there. 💪";
    return "Every expert started somewhere. Let's build your knowledge! 🚀";
  };

  const getStrength = () => {
    if (pct >= 0.8) return "You understand investing fundamentals, compound interest, and diversification very well.";
    if (pct >= 0.5) return "You have a reasonable grasp of basic investing concepts like SIPs and EMIs.";
    return "You're getting started — the basics of banking and budgeting are within reach.";
  };

  const getImprove = () => {
    if (pct >= 0.8) return "Dive deeper into tax planning (Section 80C) and advanced portfolio strategies.";
    if (pct >= 0.5) return "Focus on understanding inflation, index funds, and the 50/30/20 budgeting rule.";
    return "Start with core concepts: compound interest, diversification, and how SIPs work.";
  };

  return (
    <div className="quiz-area">
      <div className="result-card">
        <div className="result-top">
          <div className="score-label-small">Your Score</div>
          <div className="score-ring-wrap"><ScoreRing score={score} total={total}/></div>
          <p className="score-msg">{getMessage()}</p>
        </div>

        <div className="result-insights">
          <div className="insight-card strength">
            <div className="insight-label">💪 Strengths</div>
            <div className="insight-text">{getStrength()}</div>
          </div>
          <div className="insight-card improve">
            <div className="insight-label">📚 Areas to Improve</div>
            <div className="insight-text">{getImprove()}</div>
          </div>
          <div style={{padding:'16px 18px',borderRadius:16,border:'1px solid #EBEBEB',background:'#FAFAF8'}}>
            <div style={{fontSize:11,fontWeight:700,color:'#888',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:5}}>🏆 Your Level</div>
            <div style={{fontSize:13.5,color:'#444',lineHeight:1.6,letterSpacing:'-.01em'}}>
              {pct === 1 ? "Finance Expert — you're ready to mentor others!" :
               pct >= 0.8 ? "Advanced Learner — you're on your way to becoming a finance pro!" :
               pct >= 0.5 ? "Intermediate — keep practising with daily quizzes to level up." :
               "Beginner — you're building the foundation. Explore our learning resources!"}
            </div>
          </div>
        </div>

        <div className="result-actions">
          <button className="result-btn-primary" onClick={onRetry}>↺ Retry Quiz</button>
          <button className="result-btn-secondary" onClick={() => window.location.href='#'}>
            Explore Finance Tools →
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── QUIZ CARD ────────────────────────────────────────────────────────────────
function QuizCard({ question, qIndex, total, onAnswer, answered, selectedIdx, isCorrect }) {
  const LETTERS = ['A','B','C','D'];
  const catStyle = CATEGORY_COLORS[question.category] || CATEGORY_COLORS.Planning;

  function getOptionClass(i) {
    if (!answered) return 'option-btn';
    if (i === question.correct && i === selectedIdx) return 'option-btn selected-correct';
    if (i === selectedIdx && !isCorrect) return 'option-btn selected-wrong';
    if (i === question.correct) return 'option-btn reveal-correct';
    return 'option-btn dimmed';
  }

  return (
    <div className="quiz-card" key={qIndex} style={{animation:'scaleIn .35s cubic-bezier(.4,0,.2,1) both'}}>
      <div className="card-top">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div className="q-counter">Question {qIndex + 1} of {total}</div>
          <span style={{fontSize:11.5,fontWeight:500,padding:'3px 10px',borderRadius:999,
            background:catStyle.bg,color:catStyle.text,border:`1px solid ${catStyle.border}`}}>
            {question.category}
          </span>
        </div>
        <div className="q-text">{question.question}</div>
      </div>

      <div className="options">
        {question.options.map((opt, i) => (
          <button
            key={i}
            className={getOptionClass(i)}
            disabled={answered}
            onClick={() => !answered && onAnswer(i)}
          >
            <span className="option-letter">{LETTERS[i]}</span>
            <span className="option-text">{opt}</span>
          </button>
        ))}
      </div>

      {answered && (
        <div className={`feedback-bar ${isCorrect ? 'correct' : 'wrong'}`}>
          <div className="feedback-icon">
            {isCorrect ? <CheckIcon/> : <CrossIcon/>}
          </div>
          <div className="feedback-content">
            <div className="feedback-status">{isCorrect ? '✓ Correct!' : '✗ Not quite right'}</div>
            <div className="feedback-text">{question.explanation}</div>
          </div>
        </div>
      )}

      {answered && (
        <div className="next-btn-wrap">
          <button className="next-btn" onClick={() => onAnswer('next')}>
            {qIndex + 1 < total ? (
              <>Next Question <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M11 7L7.5 3.5M11 7L7.5 10.5" stroke="white" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg></>
            ) : (
              <>See My Results <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2L12 7L7 12M2 7H12" stroke="white" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg></>
            )}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── QUIZ HERO ────────────────────────────────────────────────────────────────
function QuizHero({ started, onStart }) {
  if (started) return null;
  return (
    <div className="hero" style={{paddingBottom:0}}>
      <div className="hero-badge">
        <span className="hero-badge-dot"/>
        Finance Quiz · 10 Questions
      </div>
      <h1 className="hero-title">Test Your <span className="gold">Financial</span> Intelligence</h1>
      <p className="hero-sub">Answer quick questions and discover how strong your finance knowledge really is.</p>
      <div className="hero-meta">
        <span className="hero-meta-item"><span className="hero-meta-dot"/>10 questions</span>
        <span className="hero-meta-item"><span className="hero-meta-dot"/>~5 minutes</span>
        <span className="hero-meta-item"><span className="hero-meta-dot"/>Instant feedback</span>
        <span className="hero-meta-item"><span className="hero-meta-dot"/>Free forever</span>
      </div>

      <div style={{marginTop:36,maxWidth:480,margin:'32px auto 0',display:'flex',flexDirection:'column',gap:10}}>
        <button
          onClick={onStart}
          style={{padding:'14px 32px',background:'#0F0F0F',color:'#fff',borderRadius:14,border:'none',
            fontSize:15,fontWeight:600,letterSpacing:'-.01em',cursor:'pointer',transition:'all .2s',
            display:'flex',alignItems:'center',justifyContent:'center',gap:8}}
          onMouseEnter={e=>{e.currentTarget.style.background='#2a2a2a';e.currentTarget.style.transform='translateY(-1px)';}}
          onMouseLeave={e=>{e.currentTarget.style.background='#0F0F0F';e.currentTarget.style.transform='';}}
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="white" strokeWidth="1.3"/>
            <path d="M6.5 5.5L10.5 8L6.5 10.5V5.5Z" fill="white"/>
          </svg>
          Start Quiz
        </button>
        <p style={{fontSize:12.5,color:'#BBB',textAlign:'center',marginTop:8}}>No sign-up required · Answers explained</p>
      </div>

      {/* Preview cards */}
      <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:40,flexWrap:'wrap',paddingBottom:40}}>
        {[
          {icon:'📈',label:'SIP & Investing'},
          {icon:'🏦',label:'Banking Basics'},
          {icon:'💹',label:'Market Concepts'},
          {icon:'💰',label:'Tax Planning'},
        ].map(item => (
          <div key={item.label} style={{display:'flex',alignItems:'center',gap:7,padding:'8px 14px',
            borderRadius:12,border:'1px solid #EBEBEB',background:'#fff',fontSize:13,color:'#555',
            fontWeight:500,letterSpacing:'-.01em',boxShadow:'0 2px 8px rgba(0,0,0,0.04)'}}>
            <span>{item.icon}</span>{item.label}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── STREAK BADGE ─────────────────────────────────────────────────────────────
function StreakBadge({ streak }) {
  if (streak < 2) return null;
  return (
    <div style={{textAlign:'center',marginBottom:12,animation:'popIn .4s ease both'}}>
      <span className="streak-badge">🔥 {streak} in a row!</span>
    </div>
  );
}

// ─── MAIN QUIZ PAGE ───────────────────────────────────────────────────────────
function QuizPage() {
  const [phase, setPhase]       = useState('intro');   // intro | quiz | result
  const [qIndex, setQIndex]     = useState(0);
  const [score, setScore]       = useState(0);
  const [answered, setAnswered] = useState(false);
  const [selectedIdx, setSelected] = useState(null);
  const [isCorrect, setIsCorrect]  = useState(false);
  const [streak, setStreak]     = useState(0);
  const [cardKey, setCardKey]   = useState(0);

  const q = QUESTIONS[qIndex];

  const handleStart = () => {
    setPhase('quiz');
    setQIndex(0);
    setScore(0);
    setAnswered(false);
    setSelected(null);
    setStreak(0);
    setCardKey(k => k + 1);
  };

  const handleAnswer = (idx) => {
    if (idx === 'next') {
      if (qIndex + 1 >= QUESTIONS.length) {
        setPhase('result');
      } else {
        setQIndex(i => i + 1);
        setAnswered(false);
        setSelected(null);
        setCardKey(k => k + 1);
      }
      return;
    }
    const correct = idx === q.correct;
    setSelected(idx);
    setIsCorrect(correct);
    setAnswered(true);
    if (correct) {
      setScore(s => s + 1);
      setStreak(s => s + 1);
      playSound('correct');
    } else {
      setStreak(0);
      playSound('wrong');
    }
  };

  const handleRetry = () => {
    setPhase('intro');
    setQIndex(0);
    setScore(0);
    setAnswered(false);
    setSelected(null);
    setStreak(0);
    setCardKey(0);
  };

  return (
    <>
      {phase === 'intro' && <QuizHero started={false} onStart={handleStart}/>}

      {phase === 'quiz' && (
        <div style={{paddingTop:32}}>
          {/* Hero condensed */}
          <div style={{textAlign:'center',padding:'24px 24px 0',animation:'fadeUp .4s ease both'}}>
            <div className="hero-badge" style={{marginBottom:16}}>
              <span className="hero-badge-dot"/>Finance Quiz
            </div>
            <h1 style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:30,fontWeight:600,
              letterSpacing:'-.03em',color:'#0F0F0F',marginBottom:20}}>
              Test Your Financial Intelligence
            </h1>
          </div>

          <StreakBadge streak={streak}/>
          <ProgressBar current={qIndex} total={QUESTIONS.length}/>

          <div className="quiz-area">
            <div key={cardKey}>
              <QuizCard
                question={q}
                qIndex={qIndex}
                total={QUESTIONS.length}
                answered={answered}
                selectedIdx={selectedIdx}
                isCorrect={isCorrect}
                onAnswer={handleAnswer}
              />
            </div>
          </div>
        </div>
      )}

      {phase === 'result' && (
        <div style={{paddingTop:32}}>
          <div style={{textAlign:'center',padding:'24px 24px 24px',animation:'fadeUp .4s ease both'}}>
            <div className="hero-badge" style={{marginBottom:14}}>
              <span className="hero-badge-dot"/>Quiz Complete
            </div>
            <h1 style={{fontFamily:"'DM Serif Display',Georgia,serif",fontSize:32,fontWeight:600,
              letterSpacing:'-.03em',color:'#0F0F0F',marginBottom:6}}>
              Here's How You Did
            </h1>
          </div>
          <QuizResult score={score} total={QUESTIONS.length} onRetry={handleRetry}/>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('quiz-root')).render(<QuizPage/>);
</script>
</body>
</html>
